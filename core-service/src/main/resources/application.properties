spring.application.name=core-service
server.port=${PORT:8080}

# Database Configuration with Environment Variables, Railway native support, and local fallbacks
spring.datasource.url=${MYSQL_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aifitness?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}
spring.datasource.username=${MYSQLUSER:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${SPRING_DATASOURCE_PASSWORD:1234}}

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



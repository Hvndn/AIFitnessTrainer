spring.application.name=core-service

# Database Configuration with Environment Variables and local fallbacks
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aifitness?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
